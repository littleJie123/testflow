<!--
测试用例的结构如下：
{
    "name": "测试用例名称",
    "id":"测试用例id",
    "status": "测试用例状态",// init:初始化，running:运行中，processed:成功，error:失败
    "actions": [  // 可选，测试用例的步骤
        {
            "name": "步骤名称",
            "id": "步骤id",
            "status": "步骤状态"
        }
    ]
}
-->
<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TestLow - 编排你的测试流程</title>
  <link rel="stylesheet" href="css/index.css">
  <script src="js/http.js"></script>
  <script src="js/menu.js"></script>
  <script src="js/util.js"></script>
</head>

<body>
  <div class="layout">
    <div class="menu-container" id="menuContainer"></div>
    <div class="main-content">
      <div class="header">
        <h1>TestLow - 编排你的测试流程</h1>
      </div>
      <div class="toolbar">
        <input type="text" id="searchInput" class="search-input" placeholder="输入名称或ID搜索..." oninput="handleSearch()">
        <button class="btn" onclick="runAll()">运行所有</button>
      </div>
      <div class="content" id="content"></div>
    </div>
  </div>
  <script>

    let testCases = [];
    let filteredTestCases = [];
    let http = Http.get()
    http.setClassName('test-case ')
    const urlParams = new URLSearchParams(window.location.search);
    let path = urlParams.get('path') || '';

    function updateUrl() {
      const newUrl = new URL(window.location);
      if (path) {
        newUrl.searchParams.set('path', path);
      } else {
        newUrl.searchParams.delete('path');
      }
      window.history.pushState({}, '', newUrl);
    }
    async function fetchData() {
      try {
        const data = await http.post('/listTestCase', { path });
        console.log('获取数据成功:', data);

        testCases = data.list || [];
        handleSearch();
      } catch (error) {
        console.error('获取数据失败:', error);
      }
    }

    function handleSearch() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      if (searchTerm === '') {
        filteredTestCases = testCases;

      } else {
        filteredTestCases = testCases.filter(testCase =>
          testCase.name.toLowerCase().includes(searchTerm) ||
          testCase.id.toLowerCase().includes(searchTerm)
        );
      }
      renderTestCases();
    }

    function renderTestCases() {
      const content = document.getElementById('content');
      const casesToRender = filteredTestCases.length > 0 || document.getElementById('searchInput').value ?
        filteredTestCases : testCases;
      let up = ''
      if (path) {
        up = `
          <div class="test-case">
              <div class="test-case-content" >
                  <h3>📂 ..</h3>
                  <div>名称: 上一级</div>
              </div>
              <div>
                  <button class="btn" onclick="goUp()">进入</button>
              </div>
          </div>
      `;
      }
      content.innerHTML = up + casesToRender.map(testCase => renderTestCase(testCase)).join('');
    }
    function goUp() {
      const arr = path.split('/')
      arr.pop()
      path = arr.join('/')
      updateUrl()
      fetchData()
    }
    function enterDirectory(id) {
      if (path) {
        path = path + '/' + id
      } else {
        path = id
      }
      updateUrl()
      fetchData()
    }
    function renderTestCase(testCase) {
      if (testCase.type === 'directory') {
        return `
          <div class="test-case" id="${testCase.id}">
              <div class="test-case-content" >
                  <h3>📂 ${testCase.name}</h3>
                  <div>ID: ${Util.getId(testCase.id)}</div>
              </div>
              <div>
                  <button class="btn" onclick="enterDirectory('${testCase.id}')">进入</button>
              </div>
          </div>
      `;
      }
      return `
                <div class="test-case ${testCase.status}" id="${testCase.id}">
                    <div class="test-case-content" >
                        <h3>${testCase.name}</h3>
                        <div>ID: ${Util.getId(testCase.id)}</div>
                        <div>状态: ${Util.getStatusText(testCase.status)}</div>
                        
                    </div>
                    <div>
                        <button class="btn" onclick="show('${testCase.id}')">查看</button>
                        <button class="btn" onclick="runTestCase('${testCase.id}')">运行</button>
                    </div>
                </div>
            `;
    }
    function show(id) {
      let param = escape(`${path ? path + '/' : ''}${id}`)
      window.open(`/detail.html?id=${param}`, '_test');
    }



    function toggleActions(element) {
      const testCase = element.closest('.test-case');
      testCase.classList.toggle('expanded');
    }



    function closeModal() {
      document.getElementById('logModal').style.display = 'none';
    }

    function toggleStack(element) {
      if (element.querySelector('.log-stack')) {
        element.classList.toggle('expanded');
      }
    }

    async function runTestCase(id) {
      try {
        const response = await http.post('/runTestCase', {
          id: id,
          path

        });


      } catch (error) {
        console.error('运行测试用例失败:', error);
      }
    }





    async function runAll() {
      let cases = filteredTestCases.filter(row => row.type != 'directory')
      const allIds = cases.map(testCase => testCase.id);
      try {
        const response = await http.post('/RunAllTestCase', {
          ids: allIds,
          path
        });

      } catch (error) {
        console.error('运行测试用例失败:', error);
      }
    }

    // 初始加载
    fetchData();


  </script>
</body>

</html>
